<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Analyzer - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/globals.css?v=3.0">
    <link rel="stylesheet" href="./css/components.css?v=3.0">
    <link rel="stylesheet" href="./css/auth.css?v=3.0">
</head>
<body class="login-body">
    
    <div class="login-card">
        <div class="login-header">
            <div class="login-icon">
                <i class="fa-solid fa-bolt"></i>
            </div>
            <h1 id="form-title">Welcome Back</h1>
            <p id="form-subtitle">Access your Resume Analyzer</p>
        </div>

        <div class="login-form-container">
            <div id="error-box" class="error-box" style="display: none;"></div>
            
            <form id="auth-form" class="auth-form">
                
                <div id="signup-fields" class="hidden">
                    <div class="form-group">
                        <input type="text" id="name" placeholder="Full Name" class="auth-input">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <input type="text" id="current_role" placeholder="Current Role" class="auth-input">
                        </div>
                        <div class="form-group">
                            <input type="text" id="target_role" placeholder="Target Role" class="auth-input">
                        </div>
                    </div>
                    <div class="form-group">
                        <input type="text" id="location" placeholder="Location" class="auth-input">
                    </div>
                </div>

                <div class="form-group">
                    <input type="email" id="email" placeholder="Email Address" required class="auth-input">
                </div>
                
                <div class="form-group">
                    <input type="password" id="password" placeholder="Password" required class="auth-input">
                </div>

                <button type="submit" id="submit-btn" class="btn-primary login-btn">
                    Sign In
                </button>
            </form>

            <div class="login-footer">
                <p>
                    <span id="switch-text">Don't have an account? </span>
                    <button type="button" id="switch-mode" class="switch-btn">Create Account</button>
                </p>
            </div>
        </div>
    </div>

    <script type="module" src="./js/login.js"></script>
</body>
</html>
